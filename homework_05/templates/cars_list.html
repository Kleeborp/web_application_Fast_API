{% extends 'base.html' %}

{% block title %}{{title}}{% endblock %}


{% block content %}
<h1>{{ title }}</h1>
    {% for car in cars %}
    <div class="card" style="width: 18rem;">
    <!--    <img src="images/cat.jpg" class="card-img-top" alt="...">-->
        <div class="card-body">
            <h5 class="card-title">{{ car.brand }}</h5>
            <p class="card-text">{{ car.model }}</p>
            <p class="card-text">{{ car.cost }} руб.</p>
            <a href="{{ url_for('car_details', car_id=car.id) }}" class="btn btn-primary">Смотреть</a>
        </div>
    </div>
    {% endfor %}
{% endblock %}
